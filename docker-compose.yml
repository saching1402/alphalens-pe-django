version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: alphalens
      POSTGRES_USER: alphalens
      POSTGRES_PASSWORD: ${DB_PASSWORD:-alphalens_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphalens"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn alphalens.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    volumes:
      - ./backend:/app
    environment:
      - DB_HOST=db
      - DB_NAME=alphalens
      - DB_USER=alphalens
      - DB_PASSWORD=${DB_PASSWORD:-alphalens_secret}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-prod}
      - DEBUG=${DEBUG:-False}
      - CORS_ALLOW_ALL_ORIGINS=True
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
